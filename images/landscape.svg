<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#cccccc" />
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#999999" />
      <stop offset="100%" stop-color="#000000" />
    </linearGradient>
  </defs>
  <rect width="800" height="225" fill="url(#sky)" />
  <rect y="225" width="800" height="225" fill="url(#ground)" />
  <polygon points="100,225 250,100 400,225" fill="#555555" />
  <polygon points="300,225 500,80 700,225" fill="#777777" />
  <polygon points="0,225 150,150 300,225" fill="#444444" />
</svg>
